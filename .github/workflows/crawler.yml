name: BSDetective Daily Crawler

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC = 08:00 SAST daily
  workflow_dispatch:         # manual trigger

jobs:

  # ── Stage 1A: RSS Feed Crawler — Batch A (feeds 0–27) ───────────────────────
  # ZA, Africa, UK, US politics/opinion, Europe, State Media, Business Insider
  # No AI calls. Target: under 15 minutes.
  crawl-rss-a:
    name: RSS Feed Crawler (A)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Run RSS crawler (feeds 0–27)
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FEED_START: '0'
          FEED_END:   '27'
        run: node crawler.js

  # ── Stage 1B: RSS Feed Crawler — Batch B (feeds 28–end) ─────────────────────
  # Health, Self-Improvement, Charities, Government, Education, Recruitment,
  # Real Estate, Financial Services
  # No AI calls. Runs in parallel with Batch A. Target: under 15 minutes.
  crawl-rss-b:
    name: RSS Feed Crawler (B)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Run RSS crawler (feeds 28–end)
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FEED_START: '28'
          FEED_END:   '999'
        run: node crawler.js

  # ── Stage 1C: Facebook Ad Library Scraper ───────────────────────────────────
  # Scrapes Facebook Ad Library, writes ad copy to crawler_queue.
  # No AI calls. Runs in parallel with RSS crawlers. Target: under 10 minutes.
  crawl-facebook:
    name: Facebook Ad Library Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Install Playwright browsers
        working-directory: ./crawler
        run: npx playwright install chromium --with-deps
      - name: Run Facebook scraper
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node facebook-ads-scraper.js

  # ── Stage 2: Analyzer ────────────────────────────────────────────────────────
  # Waits for all three crawlers to complete, then processes crawler_queue.
  # Handles up to 80 items per run. If queue depth exceeds 80, remaining items
  # process on the next scheduled run — no data is lost.
  # Runs even if one or more crawlers fail — partial queue is worth processing.
  analyze:
    name: Queue Analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs: [crawl-rss-a, crawl-rss-b, crawl-facebook]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Run analyzer
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
        run: node analyzer.js
