name: BSDetective Daily Crawler

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC = 08:00 SAST daily
  workflow_dispatch:         # manual trigger

jobs:

  # ── Stage 1: RSS Feed Crawler (Batch A + B in parallel) ─────────────────────
  # 20 feeds split 10/10. Batch A also runs GDELT queries (FEED_START=0).
  # No AI calls. Target: under 15 minutes per batch.
  crawl-rss:
    name: RSS Feed Crawler (${{ matrix.batch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - batch: A
            feed_start: '0'
            feed_end: '9'
          - batch: B
            feed_start: '10'
            feed_end: '19'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Run RSS crawler (Batch ${{ matrix.batch }})
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FEED_START: ${{ matrix.feed_start }}
          FEED_END:   ${{ matrix.feed_end }}
        run: node crawler.js

  # ── Stage 1C: Facebook Ad Library Scraper ───────────────────────────────────
  # Scrapes Facebook Ad Library, writes ad copy to crawler_queue.
  # No AI calls. Runs in parallel with RSS crawlers. Target: under 10 minutes.
  crawl-facebook:
    name: Facebook Ad Library Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Install Playwright browsers
        working-directory: ./crawler
        run: npx playwright install chromium --with-deps
      - name: Run Facebook scraper
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node facebook-ads-scraper.js

  # ── Stage 2: Analyzer ────────────────────────────────────────────────────────
  # Waits for all three crawlers to complete, then processes crawler_queue.
  # Handles up to 80 items per run. If queue depth exceeds 80, remaining items
  # process on the next scheduled run — no data is lost.
  # Runs even if one or more crawlers fail — partial queue is worth processing.
  analyze:
    name: Queue Analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs: [crawl-rss, crawl-facebook]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: crawler/package.json
      - name: Install dependencies
        working-directory: ./crawler
        run: npm install
      - name: Run analyzer
        working-directory: ./crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
        run: node analyzer.js
